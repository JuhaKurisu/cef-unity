# Rust クライアント/サーバーの CI ビルド (設計: docs/superpowers/specs/2026-07-22-rust-ci-design.md)
# mac は deploy.sh 再利用でバンドルまで、win はビルド+診断+ベストエフォート収集。
name: rust-build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "cef-unity-rust/**"
      - ".github/workflows/rust-build.yml"
  pull_request:
    paths:
      - "cef-unity-rust/**"
      - ".github/workflows/rust-build.yml"
  workflow_dispatch:

concurrency:
  group: rust-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mac:
    runs-on: macos-14 # arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-mac-${{ hashFiles('cef-unity-rust/Cargo.lock') }}

      # 初回の cargo 実行は CEF (~1GB) ダウンロードを含むため 1 回リトライ
      - name: Unit tests
        working-directory: cef-unity-rust
        run: cargo test --workspace --lib --release || cargo test --workspace --lib --release

      # 既存スクリプト再利用: release ビルド + server.app バンドル + ad-hoc 署名 +
      # cef-unity-unityproject/Assets/CefUnity/Interop/Plugins/osx-arm64/ へ配置
      - name: Build and bundle (deploy.sh)
        working-directory: cef-unity-rust
        run: ./deploy.sh

      - name: Zip artifact
        working-directory: cef-unity-unityproject/Assets/CefUnity/Interop/Plugins
        run: zip -qry "$GITHUB_WORKSPACE/cef-unity-macos-arm64.zip" osx-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: cef-unity-macos-arm64
          path: cef-unity-macos-arm64.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-win-${{ hashFiles('cef-unity-rust/Cargo.lock') }}

      - name: Unit tests
        working-directory: cef-unity-rust
        shell: bash
        run: cargo test --workspace --lib --release || cargo test --workspace --lib --release

      - name: Build
        working-directory: cef-unity-rust
        shell: bash
        run: cargo build --release

      # Windows のバンドル構成は 2026-05 以来未検証。初回実行はこの診断ログで
      # 収集対象を確定する (設計書に明記済み)。
      - name: Diagnostics
        working-directory: cef-unity-rust
        shell: bash
        run: |
          echo "=== target/release の exe/dll ==="
          ls -la target/release | grep -Ei '\.(exe|dll)$' || echo "(なし)"
          echo "=== cef-dll-sys out ==="
          ls -d target/release/build/cef-dll-sys-*/out/* 2>/dev/null || echo "(なし)"
          for d in target/release/build/cef-dll-sys-*/out/cef_windows_*; do
            [ -d "$d" ] || continue
            echo "--- $d ---"
            # head の SIGPIPE (exit 141) を pipefail に拾わせない
            { ls -la "$d" | head -50; } || true
          done

      - name: Collect bundle
        working-directory: cef-unity-rust
        shell: bash
        run: |
          mkdir -p bundle-win
          for f in target/release/cef_unity_rust.dll \
                   target/release/cef-unity-server.exe \
                   target/release/cef-unity-rust-helper.exe; do
            if [ -f "$f" ]; then
              cp "$f" bundle-win/
            else
              echo "SKIP (not found): $f"
            fi
          done
          CEF_DIR=$(ls -d target/release/build/cef-dll-sys-*/out/cef_windows_* 2>/dev/null | head -1)
          if [ -n "$CEF_DIR" ]; then
            # ランタイムに必要なもののみ (include/cmake/libcef_dll/*.lib 等の SDK は除外)。
            # 初回実行の診断でレイアウトはフラット (libcef.dll / *.pak / icudtl.dat /
            # v8_context_snapshot.bin / locales/) と確認済み。
            mkdir -p bundle-win/cef/locales
            for f in "$CEF_DIR"/*.dll "$CEF_DIR"/*.pak "$CEF_DIR"/*.dat \
                     "$CEF_DIR"/*.bin "$CEF_DIR"/*.json; do
              if [ -f "$f" ]; then cp "$f" bundle-win/cef/; fi
            done
            cp -R "$CEF_DIR"/locales/. bundle-win/cef/locales/ 2>/dev/null \
              || echo "SKIP (not found): locales"
          else
            echo "SKIP (not found): cef_windows_* distribution dir"
          fi
          echo "=== bundle-win ==="
          # head の SIGPIPE を避けるためファイル経由で出力
          ls -laR bundle-win > "$RUNNER_TEMP/bundle_list.txt"
          head -80 "$RUNNER_TEMP/bundle_list.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: cef-unity-windows-x64
          path: cef-unity-rust/bundle-win

  # 第3弾: タグ push (v*) または手動実行時、ビルド成果物を Plugins/ へコミット (LFS 経由)
  # し、タグ時は GitHub Release を作成する。publish のコミットは Unity 側パスのみ変更する
  # ため paths フィルタに合致せず、再ビルドはトリガーされない (ループ防止)。
  publish:
    needs: [build-mac, build-win]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update Plugins (mac)
        run: |
          unzip -oq artifacts/cef-unity-macos-arm64/cef-unity-macos-arm64.zip -d /tmp/mac
          # .meta は Unity 管理なので保持 (--delete は excluded を消さない)
          rsync -a --delete --exclude '*.meta' /tmp/mac/osx-arm64/ \
            cef-unity-unityproject/Assets/CefUnity/Interop/Plugins/osx-arm64/

      - name: Update Plugins (win, フラット展開)
        run: |
          WD=cef-unity-unityproject/Assets/CefUnity/Interop/Plugins/win-x64
          SRC=artifacts/cef-unity-windows-x64
          cp "$SRC/cef_unity_rust.dll" "$SRC/cef-unity-server.exe" "$SRC/cef-unity-rust-helper.exe" "$WD/"
          rsync -a --exclude archive.json "$SRC/cef/" "$WD/"

      - name: Warn missing .meta (新規ファイルは Unity での meta 生成が必要)
        run: |
          MISSING=0
          while IFS= read -r f; do
            if [ ! -f "$f.meta" ]; then echo "META なし: $f"; MISSING=1; fi
          done < <(find cef-unity-unityproject/Assets/CefUnity/Interop/Plugins -type f ! -name '*.meta')
          [ "$MISSING" = 0 ] && echo "全ファイルに .meta あり" || echo "(警告のみ — コミットは続行)"

      - name: Commit and push via LFS
        run: |
          git config user.name "Juha"
          git config user.email "juhasapps@gmail.com"
          git config lfs.url "${{ secrets.LFS_URL }}"
          git add cef-unity-unityproject/Assets/CefUnity/Interop/Plugins
          if git diff --staged --quiet; then
            echo "変更なし — コミットをスキップ"
          else
            git commit -m "chore: CI ビルド成果物を反映 (${GITHUB_REF_NAME})"
            git push origin main
          fi

      - name: Create GitHub Release (タグ時のみ)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          (cd artifacts/cef-unity-windows-x64 && zip -qry ../../cef-unity-windows-x64.zip .)
          cp artifacts/cef-unity-macos-arm64/cef-unity-macos-arm64.zip .
          gh release create "$GITHUB_REF_NAME" \
            cef-unity-macos-arm64.zip cef-unity-windows-x64.zip \
            --generate-notes
