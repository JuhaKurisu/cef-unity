<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 40px;
  }
  .box {
    width: 300px;
    height: 300px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    font-size: 24px;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .red   { background: rgba(255, 0, 0, 0.5); }
  .green { background: rgba(0, 200, 0, 0.3); }
  .blue  { background: rgba(0, 100, 255, 0.7); }
</style>
</head>
<body>
  <div class="box red">50%</div>
  <div class="box green">30%</div>
  <div class="box blue">70%</div>
</body>
</html>
